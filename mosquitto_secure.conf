# Metronia Water Services - Secure Mosquitto MQTT Broker
# VM1: mws-mqtt-broker / 192.168.1.10
# Copy to: /etc/mosquitto/conf.d/mws_secure.conf

per_listener_settings true
persistence true
persistence_location /var/lib/mosquitto/

log_dest file /var/log/mosquitto/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_type debug
connection_messages true
log_timestamp true

# Secure MQTT listener for authorised lab clients.
listener 8883 0.0.0.0
protocol mqtt
allow_anonymous false
password_file /etc/mosquitto/passwd
acl_file /etc/mosquitto/aclfile

# TLS certificate files generated by generate_tls_certs.sh
cafile /etc/mosquitto/certs/ca.crt
certfile /etc/mosquitto/certs/broker.crt
keyfile /etc/mosquitto/certs/broker.key
require_certificate false

# Insecure MQTT port is intentionally disabled in the final secure design.
# It may be enabled only for a short baseline comparison if specifically required.
# listener 1883 0.0.0.0
# protocol mqtt
# allow_anonymous true
